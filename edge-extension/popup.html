<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ChatGPT TTS Reader</title>
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
    <style>
        :root {
            color-scheme: light dark;
            --popup-bg: #f5f6f8;
            --popup-text: #1f2937;
            --popup-muted: #667085;
            --popup-border: #d8dee6;
            --popup-panel: #ffffff;
            --popup-primary: #1a73e8;
            --popup-primary-hover: #1557b0;
            --popup-secondary-bg: #eef2f7;
            --popup-secondary-text: #4b5563;
            --popup-secondary-hover: #e4e9f1;
            --popup-disabled: #c4c7cf;
            --popup-slider-track: #d5dbe4;
            --popup-status-bg: #e8f0fe;
            --popup-status-text: #1a73e8;
            --popup-hotkey-bg: #f1f3f4;
            --popup-hotkey-border: #d0d7de;
            text-align: center;
        }

        .tone-muted {
            color: var(--popup-muted);
        }

        .value-label {
            color: var(--popup-text);
        }
    </style>
</head>
<body>
    <div class="header">
        <h1>ChatGPT TTS Reader</h1>
    </div>
    
    <div class="controls">
        <div class="control-group">
            <button id="startBtn" class="btn">
                <span class="material-icons">play_arrow</span>
                Start Reading
            </button>
            <button id="stopBtn" class="btn secondary" disabled>
                <span class="material-icons">stop</span>
                Stop
            </button>
        </div>

        <div class="control-group">
            <button id="readSelectionBtn" class="btn secondary" title="Read selected text">
                <span class="material-icons">select_all</span>
                Read Selection
            </button>
            <button id="readTopBtn" class="btn secondary" title="Read from top">
                <span class="material-icons">vertical_align_top</span>
                Read Page
            </button>
        </div>
        
        <div class="control-group">
            <button id="prevBtn" class="btn secondary" title="Previous paragraph">
                <span class="material-icons">skip_previous</span>
            </button>
            <button id="pauseBtn" class="btn secondary" disabled>
                <span class="material-icons">pause</span>
                Pause
            </button>
            <button id="nextBtn" class="btn secondary" title="Next paragraph">
                <span class="material-icons">skip_next</span>
            </button>
        </div>
        
        <div class="slider-container">
            <span class="material-icons tone-muted">speed</span>
            <input type="range" min="0.5" max="5" value="5" step="0.1" class="slider" id="rateSlider">
            <span id="rateValue" class="value-label" style="min-width: 30px; text-align: right;">5.0x</span>
        </div>

        <div class="select-container">
            <span class="material-icons tone-muted">record_voice_over</span>
            <select id="voiceSelect" class="popup-select">
                <option value="">Auto voice</option>
            </select>
        </div>
        
        <div class="slider-container">
            <span class="material-icons tone-muted">volume_up</span>
            <input type="range" min="0.1" max="2" value="1.3" step="0.1" class="slider" id="volumeSlider">
            <span id="volumeValue" class="value-label" style="min-width: 36px; text-align: right;">1.3x</span>
        </div>

        <div class="toggle-list">
            <div class="toggle-section-title">TTS</div>
            <label class="toggle-item">
                <span class="toggle-label"><span aria-hidden="true">🖍️</span>Word highlight</span>
                <input type="checkbox" id="highlightToggle">
            </label>
            <label class="toggle-item">
                <span class="toggle-label"><span aria-hidden="true">✂️</span>Gap trim</span>
                <input type="checkbox" id="gapTrimToggle">
            </label>
            <label class="toggle-item">
                <span class="toggle-label"><span aria-hidden="true">👤</span>Read user msgs</span>
                <input type="checkbox" id="readUserMessagesToggle">
            </label>
            <label class="toggle-item">
                <span class="toggle-label"><span aria-hidden="true">🔗</span>Read refs</span>
                <input type="checkbox" id="readReferencesToggle">
            </label>
            <label class="toggle-item">
                <span class="toggle-label"><span aria-hidden="true">🎨</span>Chat style</span>
                <input type="checkbox" id="chatStyleToggle">
            </label>
            <label class="toggle-item">
                <span class="toggle-label"><span aria-hidden="true">⚡</span>Low-gap mode</span>
                <input type="checkbox" id="lowGapToggle">
            </label>
            <label class="toggle-item">
                <span class="toggle-label"><span aria-hidden="true">🛰️</span>Server precache</span>
                <input type="checkbox" id="serverPrecacheToggle">
            </label>
            <label class="toggle-item">
                <span class="toggle-label"><span aria-hidden="true">🧹</span>Normalize server text</span>
                <input type="checkbox" id="serverTextNormalizationToggle">
            </label>
            <div class="toggle-item" style="align-items:flex-start; flex-direction:column; gap:6px;">
                <span class="toggle-label"><span aria-hidden="true">❝</span>Quote handling</span>
                <select id="serverQuotePolicySelect" class="popup-select">
                    <option value="strip">Strip quote marks</option>
                    <option value="normalize">Normalize quote marks</option>
                    <option value="keep">Keep quote marks</option>
                </select>
            </div>
            <label class="toggle-item">
                <span class="toggle-label"><span aria-hidden="true">🤖</span>Auto-read new</span>
                <input type="checkbox" id="autoReadToggle">
            </label>
            <label class="toggle-item">
                <span class="toggle-label"><span aria-hidden="true">🔁</span>Loop to top</span>
                <input type="checkbox" id="loopToggle">
            </label>
            <label class="toggle-item">
                <span class="toggle-label"><span aria-hidden="true">📜</span>Auto-scroll</span>
                <input type="checkbox" id="autoScrollToggle">
            </label>
            <label class="toggle-item">
                <span class="toggle-label"><span aria-hidden="true">↔️</span>Arrow nav when idle</span>
                <input type="checkbox" id="idleArrowNavigationToggle">
            </label>
            <label class="toggle-item">
                <span class="toggle-label"><span aria-hidden="true">🧭</span>Ctrl↑↓ prompt history</span>
                <input type="checkbox" id="promptHistoryNavToggle">
            </label>
            <label class="toggle-item">
                <span class="toggle-label"><span aria-hidden="true">🪟</span>Page overlay</span>
                <input type="checkbox" id="pageOverlayToggle">
            </label>
            <label class="toggle-item">
                <span class="toggle-label"><span aria-hidden="true">📊</span>Diagnostics</span>
                <input type="checkbox" id="diagnosticsToggle">
            </label>
            <div class="toggle-item" style="align-items:flex-start; flex-direction:column; gap:6px;">
                <span class="toggle-label"><span aria-hidden="true">👁️</span>Hidden tab policy</span>
                <select id="hiddenTabPolicySelect" class="popup-select">
                    <option value="never">Never pause</option>
                    <option value="delay">Pause after delay</option>
                    <option value="immediate">Pause immediately</option>
                </select>
            </div>
            <div class="toggle-item" style="align-items:flex-start; flex-direction:column; gap:6px;">
                <span class="toggle-label"><span aria-hidden="true">⏱️</span>Hidden pause delay (ms)</span>
                <input id="autoPauseHiddenDelayInput" type="number" min="0" step="500" class="popup-select">
            </div>
            <div class="toggle-section-title">ChatGPT Tools</div>
            <label class="toggle-item">
                <span class="toggle-label"><span aria-hidden="true">🔊</span>Volume boost</span>
                <input type="checkbox" id="volumeBoostToggle">
            </label>
            <label class="toggle-item">
                <span class="toggle-label"><span aria-hidden="true">⌨️</span>Enter-to-send</span>
                <input type="checkbox" id="enterToSendToggle">
            </label>
            <label class="toggle-item">
                <span class="toggle-label"><span aria-hidden="true">📋</span>Global paste</span>
                <input type="checkbox" id="globalPasteToggle">
            </label>
            <label class="toggle-item">
                <span class="toggle-label"><span aria-hidden="true">📝</span>Regular paste</span>
                <input type="checkbox" id="regularPasteToggle">
            </label>
            <label class="toggle-item">
                <span class="toggle-label"><span aria-hidden="true">📤</span>Regular auto-send</span>
                <input type="checkbox" id="regularAutoSendToggle">
            </label>
            <label class="toggle-item">
                <span class="toggle-label"><span aria-hidden="true">📨</span>Textbox auto-send</span>
                <input type="checkbox" id="regularAutoSendInInputToggle">
            </label>
            <label class="toggle-item">
                <span class="toggle-label"><span aria-hidden="true">✨</span>NICE auto-paste</span>
                <input type="checkbox" id="nicePasteToggle">
            </label>
            <label class="toggle-item">
                <span class="toggle-label"><span aria-hidden="true">🚀</span>NICE auto-send</span>
                <input type="checkbox" id="niceSendToggle">
            </label>
            <label class="toggle-item">
                <span class="toggle-label"><span aria-hidden="true">📑</span>Copy buttons</span>
                <input type="checkbox" id="copyButtonsToggle">
            </label>
            <label class="toggle-item">
                <span class="toggle-label"><span aria-hidden="true">✏️</span>Double-click edit</span>
                <input type="checkbox" id="doubleClickEditToggle">
            </label>
            <label class="toggle-item">
                <span class="toggle-label"><span aria-hidden="true">⚠️</span>Auto-close warnings</span>
                <input type="checkbox" id="autoCloseWarningsToggle">
            </label>
        </div>

        <button id="resetOverlayBtn" class="btn secondary" title="Reset webpage overlay position" style="width:100%; justify-content:center;">
            <span class="material-icons">my_location</span>
            Reset Overlay Position
        </button>

        <div id="status" class="status"></div>
        <div id="progress" class="status" style="display:block; background-color: transparent; color: var(--popup-muted); padding: 0;"></div>
        <div id="lockInfo" class="status" style="display:block; background-color: transparent; color: var(--popup-muted); padding: 0;"></div>
    </div>

    <div class="footer" style="display:flex; flex-direction:column; gap:6px;">
        <button id="optionsBtn" class="btn secondary" style="width:100%; justify-content:center;">
            <span class="material-icons">settings</span>
            Settings
        </button>
        <div>
            <p>Press <span class="hotkey">U</span> to start reading from cursor</p>
            <p>Press <span class="hotkey">P</span> to pause/resume</p>
        </div>
    </div>
    
    <script src="popup.js"></script>
</body>
</html>
