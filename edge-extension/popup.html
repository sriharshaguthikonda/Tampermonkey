<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ChatGPT TTS Reader</title>
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
    <style>
        body {
            width: 300px;
            margin: 0;
            padding: 15px;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, 'Open Sans', 'Helvetica Neue', sans-serif;
            background-color: #f5f5f5;
            color: #333;
        }
        
        .header {
            display: flex;
            align-items: center;
            margin-bottom: 15px;
            padding-bottom: 10px;
            border-bottom: 1px solid #e0e0e0;
        }
        
        .header h1 {
            margin: 0;
            font-size: 18px;
            color: #1a73e8;
        }
        
        .controls {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }
        
        .control-group {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        
        .btn {
            background-color: #1a73e8;
            color: white;
            border: none;
            border-radius: 4px;
            padding: 8px 12px;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 14px;
            transition: background-color 0.2s;
        }
        
        .btn:hover {
            background-color: #1557b0;
        }
        
        .btn:disabled {
            background-color: #cccccc;
            cursor: not-allowed;
        }
        
        .btn.secondary {
            background-color: #f1f3f4;
            color: #5f6368;
        }
        
        .btn.secondary:hover {
            background-color: #e8eaed;
        }
        
        .slider-container {
            display: flex;
            align-items: center;
            gap: 10px;
            width: 100%;
        }

        .toggle-list {
            display: flex;
            flex-direction: column;
            gap: 8px;
            background: #ffffff;
            border: 1px solid #e0e0e0;
            border-radius: 8px;
            padding: 10px;
        }

        .toggle-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            font-size: 13px;
            color: #444;
        }

        .toggle-item input {
            transform: scale(1.1);
        }
        
        .slider {
            flex: 1;
            -webkit-appearance: none;
            height: 6px;
            border-radius: 3px;
            background: #e0e0e0;
            outline: none;
        }
        
        .slider::-webkit-slider-thumb {
            -webkit-appearance: none;
            appearance: none;
            width: 16px;
            height: 16px;
            border-radius: 50%;
            background: #1a73e8;
            cursor: pointer;
        }
        
        .status {
            margin-top: 10px;
            padding: 8px;
            border-radius: 4px;
            font-size: 13px;
            display: none;
        }
        
        .status.active {
            display: block;
            background-color: #e8f0fe;
            color: #1a73e8;
        }
        
        .hotkey {
            background-color: #f1f3f4;
            border-radius: 3px;
            padding: 2px 6px;
            font-family: monospace;
            font-size: 12px;
            border: 1px solid #dadce0;
        }
        
        .footer {
            margin-top: 15px;
            padding-top: 10px;
            border-top: 1px solid #e0e0e0;
            font-size: 12px;
            color: #5f6368;
            text-align: center;
        }
    </style>
</head>
<body>
    <div class="header">
        <h1>ChatGPT TTS Reader</h1>
    </div>
    
    <div class="controls">
        <div class="control-group">
            <button id="startBtn" class="btn">
                <span class="material-icons">play_arrow</span>
                Start Reading
            </button>
            <button id="stopBtn" class="btn secondary" disabled>
                <span class="material-icons">stop</span>
                Stop
            </button>
        </div>

        <div class="control-group">
            <button id="readSelectionBtn" class="btn secondary" title="Read selected text">
                <span class="material-icons">select_all</span>
                Read Selection
            </button>
            <button id="readTopBtn" class="btn secondary" title="Read from top">
                <span class="material-icons">vertical_align_top</span>
                Read Page
            </button>
        </div>
        
        <div class="control-group">
            <button id="prevBtn" class="btn secondary" title="Previous paragraph">
                <span class="material-icons">skip_previous</span>
            </button>
            <button id="pauseBtn" class="btn secondary" disabled>
                <span class="material-icons">pause</span>
                Pause
            </button>
            <button id="nextBtn" class="btn secondary" title="Next paragraph">
                <span class="material-icons">skip_next</span>
            </button>
        </div>
        
        <div class="slider-container">
            <span class="material-icons" style="color: #5f6368;">speed</span>
            <input type="range" min="0.5" max="5" value="5" step="0.1" class="slider" id="rateSlider">
            <span id="rateValue" style="min-width: 30px; text-align: right;">5.0x</span>
        </div>

        <div class="toggle-list">
            <label class="toggle-item">
                <span>Word highlight</span>
                <input type="checkbox" id="highlightToggle">
            </label>
            <label class="toggle-item">
                <span>Gap trim</span>
                <input type="checkbox" id="gapTrimToggle">
            </label>
            <label class="toggle-item">
                <span>Read user msgs</span>
                <input type="checkbox" id="readUserMessagesToggle">
            </label>
            <label class="toggle-item">
                <span>Auto-read new</span>
                <input type="checkbox" id="autoReadToggle">
            </label>
            <label class="toggle-item">
                <span>Loop to top</span>
                <input type="checkbox" id="loopToggle">
            </label>
            <label class="toggle-item">
                <span>Diagnostics</span>
                <input type="checkbox" id="diagnosticsToggle">
            </label>
        </div>

        <div id="status" class="status"></div>
        <div id="progress" class="status" style="display:block; background-color: transparent; color: #5f6368; padding: 0;"></div>
    </div>

    <div class="footer" style="display:flex; flex-direction:column; gap:6px;">
        <button id="optionsBtn" class="btn secondary" style="width:100%; justify-content:center;">
            <span class="material-icons">settings</span>
            Settings
        </button>
        <div>
            <p>Press <span class="hotkey">U</span> to start reading from cursor</p>
            <p>Press <span class="hotkey">P</span> to pause/resume</p>
        </div>
    </div>
    
    <script src="popup.js"></script>
</body>
</html>
